<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>For You 🤍</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{
  min-height:100svh;
  background:radial-gradient(circle at 15% 8%,rgba(255,215,220,.65),transparent 32%),
  radial-gradient(circle at 90% 92%,rgba(255,235,190,.72),transparent 34%),#fff8ef;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  color:#3c2f2f;overflow-x:hidden;
}
.floaters{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.floater{position:absolute;opacity:.55;animation:floaty 8s ease-in-out infinite;font-size:18px}
.floater:nth-child(1){top:8%;left:8%}.floater:nth-child(2){top:18%;right:10%;animation-delay:1s}.floater:nth-child(3){bottom:16%;left:9%;animation-delay:2s}.floater:nth-child(4){bottom:10%;right:8%;animation-delay:3s}.floater:nth-child(5){top:55%;left:4%;animation-delay:1.8s}.floater:nth-child(6){top:64%;right:5%;animation-delay:.8s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(8deg)}}
.screen{position:relative;z-index:1;min-height:100svh;display:grid;place-items:center;padding:14px}
.cover{
  width:min(430px,100%);min-height:calc(100svh - 28px);display:grid;place-items:center;text-align:center;
  padding:34px 24px;border-radius:34px;background:rgba(255,253,248,.9);
  border:1px solid rgba(120,78,70,.10);box-shadow:0 24px 70px rgba(75,48,42,.14);
  backdrop-filter:blur(18px);cursor:pointer;
}
.heart{font-size:44px;animation:pulse 1.6s ease-in-out infinite;margin-bottom:22px}
@keyframes pulse{50%{transform:scale(1.1)}}
h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(40px,12vw,58px);line-height:1;font-weight:500;letter-spacing:-.04em;margin:0 0 14px}
.small{color:#8b7470;font-size:15px;line-height:1.7;max-width:320px;margin:0 auto 26px}
button{
  border:0;border-radius:999px;background:#3c2f2f;color:white;width:100%;max-width:310px;
  padding:15px 18px;font-weight:800;font-size:14px;box-shadow:0 12px 28px rgba(60,47,47,.18);cursor:pointer;
}
button:active{transform:scale(.98)}
.ghost{background:rgba(60,47,47,.08);color:#3c2f2f;box-shadow:none}
.card-stage{display:none;width:min(430px,100%);animation:appear .8s ease both}
body.opened .cover{display:none}
body.opened .card-stage{display:block}
@keyframes appear{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.top-actions{display:grid;gap:10px;margin:0 0 12px;place-items:center}
.card-wrap{width:100%;border-radius:28px;overflow:hidden;box-shadow:0 24px 70px rgba(75,48,42,.16);background:#fff8ef;border:1px solid rgba(120,78,70,.10)}
.card-wrap img{width:100%;display:block}
.music-fab{position:fixed;right:16px;bottom:16px;z-index:5;width:54px;height:54px;border-radius:999px;display:grid;place-items:center;background:rgba(255,253,248,.92);border:1px solid rgba(120,78,70,.12);box-shadow:0 14px 34px rgba(75,48,42,.18);font-size:22px;cursor:pointer}
.ytbox{display:none;width:0;height:0;overflow:hidden}
.download-note{text-align:center;color:#8b7470;font-size:12px;margin:10px 0 0}
@media(min-width:700px){.screen{padding:24px}.card-stage{width:min(520px,100%)}}
</style>
</head>
<body>
<div class="floaters" aria-hidden="true">
  <div class="floater">✦</div><div class="floater">♡</div><div class="floater">✧</div>
  <div class="floater">♡</div><div class="floater">✦</div><div class="floater">✧</div>
</div>

<main class="screen">
  <section class="cover" id="openCover">
    <div>
      <div class="heart">💖</div>
      <h1>For you..</h1>
      <p class="sub">someone who deserved better from me this time…<br>
        🎂 my tiny late birthday thank-you for you </p>
      <button type="button" id="openBtn">Open your little card</button>
    </div>
  </section>

  <section class="card-stage" id="stage">
    <div class="top-actions">
      <button type="button" id="musicBtn">Play the song ♪</button>
      <button type="button" class="ghost" id="downloadBtn">Download this card</button>
    </div>
    <div class="card-wrap" id="downloadArea">
      <img src="card.png" alt="A love card" />
    </div>
    <p class="download-note">tap music once — phones usually block autoplay until a tap</p>
  </section>
</main>

<div class="music-fab" id="musicFab">♪</div>
<div class="ytbox" id="ytbox"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const YOUTUBE_LINK = "https://youtu.be/Evm8KhnKWSc";

let ytStarted=false;

function openCard(){
  document.body.classList.add("opened");
  setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),80);
}

function getYouTubeId(url){
  const match=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match?match[1]:null;
}

function playYouTube(){
  const id=getYouTubeId(YOUTUBE_LINK);
  const btn=document.getElementById("musicBtn");
  if(!id){btn.textContent="Paste YouTube link first";return;}
  if(!ytStarted){
    document.getElementById("ytbox").innerHTML=`<iframe width="1" height="1" src="https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=0" allow="autoplay; encrypted-media"></iframe>`;
    ytStarted=true;btn.textContent="Song is playing ♪";
  }else{
    document.getElementById("ytbox").innerHTML="";
    ytStarted=false;btn.textContent="Play the song ♪";
  }
}

async function downloadCard(){
  const area=document.getElementById("downloadArea");
  const canvas=await html2canvas(area,{backgroundColor:"#fff8ef",scale:3,useCORS:true});
  const link=document.createElement("a");
  link.download="for-you-card.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
}

document.getElementById("openCover").addEventListener("click",openCard);
document.getElementById("openBtn").addEventListener("click",function(e){e.stopPropagation();openCard();});
document.getElementById("musicBtn").addEventListener("click",playYouTube);
document.getElementById("musicFab").addEventListener("click",playYouTube);
document.getElementById("downloadBtn").addEventListener("click",downloadCard);
</script>
</body>
</html>
